defaults:
  pt_edges: [0, 5, 10, 15, 20, 30, 40, 60, 80, 100, 150, 200]
  eta_range: [-5, 5]
  phi_range: [-3.5, 3.5]
  vz_range: [-10, 10]
  mult_range: [0, 50]

objects:
  genel:
    pt_field: pt
  matched_genel:
    pt_field: pt
  tkele:
    pt_field: ptCorr
  matched_tkele:
    pt_field: ptCorr

plots:
  pt:
    variables: [pt]
    logy: true
    axes:
      - {type: Variable, name: pt, edges_ref: pt_edges, label: "pT"}

  eta:
    variables: [eta]
    axes:
      - {type: Regular, bins: 50, range_ref: eta_range, label: "eta"}

  phi:
    variables: [phi]
    axes:
      - {type: Regular, bins: 50, range_ref: phi_range, label: "phi"}

  charge:
    variables: [charge]
    axes:
      - {type: Regular, bins: 3, range: [-1, 2], label: "charge"}

  multiplicity:
    variables: [multiplicity]
    axes:
      - {type: Regular, bins: 50, range_ref: mult_range, label: "multiplicity"}

per_object:
  genel:
    plots:
      vz:
        variables: [vz]
        axes:
          - {type: Regular, bins: 100, range_ref: vz_range, label: "vz"}

      prompt:
        variables: [prompt]
        axes:
          - {type: Regular, bins: 3, range: [0, 3], label: "prompt"}

  tkele:
    objects: [tkele, matched_tkele]
    plots:
      idScore:
        variables: [idScore]
        axes:
          - {type: Regular, bins: 50, range: [0, 1], label: "idScore"}

      hwQual:
        variables: [hwQual]
        axes:
          - {type: Regular, bins: 16, range: [0, 16], label: "hwQual"}

      pfIso:
        variables: [pfIso]
        axes:
          - {type: Regular, bins: 50, range: [0, 5], label: "pfIso"}

      puppiIso:
        variables: [puppiIso]
        axes:
          - {type: Regular, bins: 50, range: [0, 5], label: "puppiIso"}

special:
  tkele_isMatched:
    object: tkele
    variables: [isMatched]
    axes:
      - {type: Regular, bins: 50, range: [0, 1.05], label: "purity"}

  genel_isReconstructed:
    object: genel
    variables: [isReconstructed]
    axes:
      - {type: Regular, bins: 50, range: [0, 1.05], label: "efficiency"}

  matched_tkele_resolution:
    object: matched_tkele
    variables: [resolution]
    axes:
      - {type: Regular, bins: 50, range: [0, 3], label: "pT(reco)/pT(gen)"}

