defaults:
  pt_range: [0, 100]
  eta_range: [-5, 5]
  phi_range: [-3.5, 3.5]
  vz_range: [-10, 10]
  mass_range: [0, 60]
  mult_range_ele: [0, 50]
  mult_range_pair: [0, 50]
  delta_pt_range: [0, 200]
  delta_phi_range: [0, 3.2]
  delta_r_range: [0, 5]
  mult_range_pfcands: [0, 500]

objects:
  - genel
  - matched_genel
  - nonMatched_genel

  - tkele
  - matched_tkele
  - nonMatched_tkele

  - tkelePair
  - matched_tkelePair
  - nonMatched_tkelePair
  - best_tkelePair
  - best_tkeleLead
  - best_tkeleSub

  - tkeleLead
  - matched_tkeleLead
  - nonMatched_tkeleLead

  - tkeleSub
  - matched_tkeleSub
  - nonMatched_tkeleSub

  - genelPair
  - genelLead
  - genelSub

  - L1PFCands

plots:
  pt:
    variables: [pt]
    logy: true
    axes:
      - {type: Regular, bins: 50, name: pt, range_ref: pt_range, label: "pT"}

  eta:
    variables: [eta]
    axes:
      - {type: Regular, bins: 50, range_ref: eta_range, label: "eta"}

  phi:
    variables: [phi]
    axes:
      - {type: Regular, bins: 20, range_ref: phi_range, label: "phi"}

  vz:
    variables: [vz]
    axes:
      - {type: Regular, bins: 50, range_ref: vz_range, label: "vz"}

  charge:
    variables: [charge]
    axes:
      - {type: Regular, bins: 3, range: [-1, 2], label: "charge"}

  multiplicity:
    variables: [multiplicity]
    axes:
      - {type: Regular, bins: 50, range_ref: mult_range_ele, label: "multiplicity"}

per_object:
  L1PFCands:
    objects: [L1PFCands]
    plots:
      eta:
        variables: [eta]
        axes:
          - {type: Regular, bins: 50, range_ref: eta_range, label: "L1PFCand #eta"}

      multiplicity:
        variables: [multiplicity]
        axes:
          - {type: Regular, bins: 300, range_ref: mult_range_pfcands, label: "n(L1PFCands)"}

  genel:
    objects: [genel, matched_genel, nonMatched_genel]
    plots:
      prompt:
        variables: [prompt]
        axes:
          - {type: Regular, bins: 2, range: [0, 2], label: "prompt"}

  genelPair:
    objects: [genelPair]
    plots:
      eta_region_cat:
        variables: [eta_region_cat]
        axes:
          - {type: Variable, edges: [-0.5, 0.5, 1.5, 2.5], label: "Gen ee category (0=BB,1=BE,2=EE)"}

      mass:
        variables: [mass]
        axes:
          - {type: Regular, bins: 120, range_ref: mass_range, label: "m(ee) [GeV]"}

      delta_eta:
        variables: [delta_eta]
        axes:
          - {type: Regular, bins: 50, range_ref: eta_range, label: "|Δeta|"}

      delta_phi:
        variables: [delta_phi]
        axes:
          - {type: Regular, bins: 50, range_ref: delta_phi_range, label: "|Δphi|"}

      delta_vz:
        variables: [delta_vz]
        axes:
          - {type: Regular, bins: 50, range_ref: vz_range, label: "|Δvz|"}

      delta_pt:
        variables: [delta_pt]
        axes:
          - {type: Regular, bins: 100, range_ref: delta_pt_range, label: "|ΔpT|"}

      delta_pt_over_pt:
        variables: [delta_pt_over_pt]
        axes:
          - {type: Regular, bins: 80, range: [0, 2.0], label: "|ΔpT| / pT(ee)"}

      delta_eta_over_eta:
        variables: [delta_eta_over_eta]
        axes:
          - {type: Regular, bins: 80, range: [0, 5.0], label: "|Δeta| / |eta(ee)|"}

      delta_phi_over_phi:
        variables: [delta_phi_over_phi]
        axes:
          - {type: Regular, bins: 80, range: [0, 5.0], label: "|Δphi| / |phi(ee)|"}

      pt_over_mass:
        variables: [pt_over_mass]
        axes:
          - {type: Regular, bins: 80, range: [0, 20], label: "Gen pT(ee)/m(ee)"}

      charge_prod:
        variables: [charge_prod]
        axes:
          - {type: Regular, bins: 3, range: [-1, 2], label: "Gen q1*q2"}

      eta_prod:
        variables: [eta_prod]
        axes:
          - {type: Regular, bins: 50, range: [-5, 5], label: "Gen eta1*eta2"}

      delta_r:
        variables: [delta_r]
        axes:
          - {type: Regular, bins: 60, range_ref: delta_r_range, label: "ΔR(ee)"}

  genelLead:
    objects: [genelLead]
    plots:
      vz:
        variables: [vz]
        axes:
          - {type: Regular, bins: 50, range_ref: vz_range, label: "vz"}

  genelSub:
    objects: [genelSub]
    plots:
      vz:
        variables: [vz]
        axes:
          - {type: Regular, bins: 50, range_ref: vz_range, label: "vz"}

  tkele:
    objects: [tkele, matched_tkele, nonMatched_tkele]
    plots:
      idScore:
        variables: [idScore]
        axes:
          - {type: Regular, bins: 50, range: [-1, 1], label: "idScore"}

      hwQual:
        variables: [hwQual]
        axes:
          - {type: Regular, bins: 16, range: [0, 16], label: "hwQual"}

      pfIso:
        variables: [pfIso]
        axes:
          - {type: Regular, bins: 5000, range: [0, 5], label: "pfIso"}

      puppiIso:
        variables: [puppiIso]
        axes:
          - {type: Regular, bins: 5000, range: [0, 5], label: "puppiIso"}

      tkIso:
        variables: [tkIso]
        axes:
          - {type: Regular, bins: 5000, range: [0, 5], label: "tkIso"}

      tkIsoPV:
        variables: [tkIsoPV]
        axes:
          - {type: Regular, bins: 500, range: [0, 1], label: "tkIsoPV"}

      customPuppiIso:
        variables: [customPuppiIso]
        axes:
          - {type: Regular, bins: 200, range: [0, 2], label: "customPuppiIso"}

      customPfIso:
        variables: [customPfIso]
        axes:
          - {type: Regular, bins: 5000, range: [0, 5], label: "customPfIso"}

      customPfIso_looserSelfVeto:
        variables: [customPfIso_looserSelfVeto]
        axes:
          - {type: Regular, bins: 500, range: [0, 5], label: "customPfIso (self-veto 0.05, all)"}

      customPfIso_dz:
        variables: [customPfIso_dz]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPfIso (+ charged dZ)"}

      # NOTE: customPfIso_otherEleVeto is not guaranteed on standalone tkele/matched_tkele
      # If you propagate it onto these collections, uncomment below:
      # customPfIso_otherEleVeto:
      #   variables: [customPfIso_otherEleVeto]
      #   axes:
      #     - {type: Regular, bins: 50, range: [0, 5], label: "customPfIso (+ other-e veto)"}

      relPfIso:
        variables: [relPfIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5.0], label: "pfIso / pT"}

      relPuppiIso:
        variables: [relPuppiIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5.0], label: "puppiIso / pT"}

  tkeleLead:
    objects: [tkeleLead, matched_tkeleLead, nonMatched_tkeleLead, best_tkeleLead]
    plots:
      customPuppiIso_looserSelfVeto:
        variables: [customPuppiIso_looserSelfVeto]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPuppiIso (self-veto 0.05, all)"}

      customPuppiIso_dz:
        variables: [customPuppiIso_dz]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPuppiIso (+ charged dZ)"}

      customPuppiIso_otherEleVeto:
        variables: [customPuppiIso_otherEleVeto]
        axes:
          - {type: Regular, bins: 50000, range: [0, 10], label: "customPuppiIso (+ other-e veto)"}

      puppiIso_vs_pt:
        variables: [pt, puppiIso]
        axes:
          - {type: Regular, bins: 50, range_ref: pt_range, label: "pT"}
          - {type: Regular, bins: 5000, range: [0, 2], label: "puppiIso"}

      customPuppiIso_otherEleVeto_vs_pt:
        variables: [pt, customPuppiIso_otherEleVeto]
        axes:
          - {type: Regular, bins: 50, range_ref: pt_range, label: "pT"}
          - {type: Regular, bins: 5000, range: [0, 10], label: "customPuppiIso (+ other-e veto)"}

      pfIso_vs_pt:
        variables: [pt, pfIso]
        axes:
          - {type: Regular, bins: 50, range_ref: pt_range, label: "pT"}
          - {type: Regular, bins: 5000, range: [0, 10], label: "pfIso"}

      customPfIso_otherEleVeto_vs_pt:
        variables: [pt, customPfIso_otherEleVeto]
        axes:
          - {type: Regular, bins: 50, range_ref: pt_range, label: "pT"}
          - {type: Regular, bins: 5000, range: [0, 10], label: "customPfIso (+ other-e veto)"}

      tkIso_vs_pt:
        variables: [pt, tkIso]
        axes:
          - {type: Regular, bins: 50, range_ref: pt_range, label: "pT"}
          - {type: Regular, bins: 5000, range: [0, 2], label: "tkIso"}

      idScore:
        variables: [idScore]
        axes:
          - {type: Regular, bins: 50, range: [-1, 1], label: "idScore"}

      hwQual:
        variables: [hwQual]
        axes:
          - {type: Regular, bins: 16, range: [0, 16], label: "hwQual"}

      pfIso:
        variables: [pfIso]
        axes:
          - {type: Regular, bins: 50000, range: [0, 10], label: "pfIso"}

      puppiIso:
        variables: [puppiIso]
        axes:
          - {type: Regular, bins: 50000, range: [0, 2], label: "puppiIso"}

      tkIso:
        variables: [tkIso]
        axes:
          - {type: Regular, bins: 50000, range: [0, 2], label: "tkIso"}

      tkIsoPV:
        variables: [tkIsoPV]
        axes:
          - {type: Regular, bins: 500, range: [0, 1], label: "tkIsoPV"}

      customPuppiIso:
        variables: [customPuppiIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPuppiIso"}

      customPfIso:
        variables: [customPfIso]
        axes:
          - {type: Regular, bins: 5000, range: [0, 5], label: "customPfIso"}

      customPfIso_looserSelfVeto:
        variables: [customPfIso_looserSelfVeto]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPfIso (self-veto 0.05, all)"}

      customPfIso_dz:
        variables: [customPfIso_dz]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPfIso (+ charged dZ)"}

      customPfIso_otherEleVeto:
        variables: [customPfIso_otherEleVeto]
        axes:
          - {type: Regular, bins: 50000, range: [0, 10], label: "customPfIso (+ other-e veto)"}

      relPfIso:
        variables: [relPfIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5.0], label: "pfIso / pT"}

      relPuppiIso:
        variables: [relPuppiIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5.0], label: "puppiIso / pT"}

  tkeleSub:
    objects: [tkeleSub, matched_tkeleSub, nonMatched_tkeleSub, best_tkeleSub]
    plots:
      idScore:
        variables: [idScore]
        axes:
          - {type: Regular, bins: 50, range: [-1, 1], label: "idScore"}

      hwQual:
        variables: [hwQual]
        axes:
          - {type: Regular, bins: 16, range: [0, 16], label: "hwQual"}

      pfIso:
        variables: [pfIso]
        axes:
          - {type: Regular, bins: 50000, range: [0, 10], label: "pfIso"}

      puppiIso:
        variables: [puppiIso]
        axes:
          - {type: Regular, bins: 50000, range: [0, 10], label: "puppiIso"}

      tkIso:
        variables: [tkIso]
        axes:
          - {type: Regular, bins: 50000, range: [0, 10], label: "tkIso"}

      tkIsoPV:
        variables: [tkIsoPV]
        axes:
          - {type: Regular, bins: 500, range: [0, 1], label: "tkIsoPV"}

      customPuppiIso:
        variables: [customPuppiIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPuppiIso"}

      customPfIso:
        variables: [customPfIso]
        axes:
          - {type: Regular, bins: 5000, range: [0, 5], label: "customPfIso"}

      customPfIso_looserSelfVeto:
        variables: [customPfIso_looserSelfVeto]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPfIso (self-veto 0.05, all)"}

      customPfIso_dz:
        variables: [customPfIso_dz]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "customPfIso (+ charged dZ)"}

      customPfIso_otherEleVeto:
        variables: [customPfIso_otherEleVeto]
        axes:
          - {type: Regular, bins: 50000, range: [0, 10], label: "customPfIso (+ other-e veto)"}

      relPfIso:
        variables: [relPfIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5.0], label: "pfIso / pT"}

      relPuppiIso:
        variables: [relPuppiIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5.0], label: "puppiIso / pT"}

  tkelePair:
    objects: [tkelePair, matched_tkelePair, nonMatched_tkelePair, best_tkelePair]
    plots:
      mass:
        variables: [mass]
        axes:
          - {type: Regular, bins: 120, range_ref: mass_range, label: "m(ee) [GeV]"}

      delta_eta:
        variables: [delta_eta]
        axes:
          - {type: Regular, bins: 50, range_ref: eta_range, label: "|Δeta|"}

      delta_phi:
        variables: [delta_phi]
        axes:
          - {type: Regular, bins: 50, range_ref: delta_phi_range, label: "|Δphi|"}

      delta_vz:
        variables: [delta_vz]
        axes:
          - {type: Regular, bins: 50, range_ref: vz_range, label: "|Δvz|"}

      delta_pt:
        variables: [delta_pt]
        axes:
          - {type: Regular, bins: 100, range_ref: delta_pt_range, label: "|ΔpT|"}

      delta_pt_over_pt:
        variables: [delta_pt_over_pt]
        axes:
          - {type: Regular, bins: 80, range: [0, 2.0], label: "|ΔpT| / pT(ee)"}

      delta_eta_over_eta:
        variables: [delta_eta_over_eta]
        axes:
          - {type: Regular, bins: 80, range: [0, 5.0], label: "|Δeta| / |eta(ee)|"}

      delta_phi_over_phi:
        variables: [delta_phi_over_phi]
        axes:
          - {type: Regular, bins: 80, range: [0, 5.0], label: "|Δphi| / |phi(ee)|"}

      pt_over_mass:
        variables: [pt_over_mass]
        axes:
          - {type: Regular, bins: 80, range: [0, 20], label: "pT(ee)/m(ee)"}

      charge_prod:
        variables: [charge_prod]
        axes:
          - {type: Regular, bins: 3, range: [-1, 2], label: "q1*q2"}

      eta_prod:
        variables: [eta_prod]
        axes:
          - {type: Regular, bins: 50, range: [-5, 5], label: "eta1*eta2"}

      max_customPuppiIso:
        variables: [max_customPuppiIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "max(customPUPPI iso)"}

      max_customPfIso:
        variables: [max_customPfIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "max(customPfIso)"}

      max_customPfIso_looserSelfVeto:
        variables: [max_customPfIso_looserSelfVeto]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "max(customPfIso looser self-veto)"}

      max_customPfIso_otherEleVeto:
        variables: [max_customPfIso_otherEleVeto]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "max(customPfIso + other-e veto)"}

      max_customPfIso_dz:
        variables: [max_customPfIso_dz]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "max(customPfIso + charged dZ)"}

      max_relPfIso:
        variables: [max_relPfIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "max(PF relIso)"}

      max_relPuppiIso:
        variables: [max_relPuppiIso]
        axes:
          - {type: Regular, bins: 100, range: [0, 5], label: "max(PUPPI relIso)"}

      isGenMatched:
        variables: [isGenMatched]
        axes:
          - {type: Regular, bins: 2, range: [0, 2], label: "isGenMatched"}

      delta_r:
        variables: [delta_r]
        axes:
          - {type: Regular, bins: 60, range_ref: delta_r_range, label: "ΔR(ee)"}

special:
  tkele_isMatched:
    object: tkele
    variables: [isMatched]
    axes:
      - {type: Regular, bins: 50, range: [0, 1.05], label: "purity"}

  genel_isReconstructed:
    object: genel
    variables: [isReconstructed]
    axes:
      - {type: Regular, bins: 50, range: [0, 1.05], label: "efficiency"}

  matched_tkele_resolution:
    object: matched_tkele
    variables: [resolution]
    axes:
      - {type: Regular, bins: 50, range: [0, 3], label: "pT(reco)/pT(gen)"}
